server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/library_system?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Taipei&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Disable Spring Security auto-config form login
  security:
    user:
      name: disable

app:
  jwt:
    secret: ${JWT_SECRET:library-system-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiration: 86400000   # 24 hours in ms

logging:
  level:
    com.library: DEBUG
    org.springframework.jdbc: DEBUG
